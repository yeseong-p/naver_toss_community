<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>종토방 실시간 모니터링</title>
<style>
  :root {
    --bg: #0f1419;
    --bg-panel: #1a1f26;
    --bg-card: #232a33;
    --border: #2e3742;
    --text: #e3e8ee;
    --text-dim: #8b95a3;
    --accent: #4a9eff;
    --naver: #03c75a;
    --toss: #3182f6;
    --ok: #22c55e;
    --warn: #f59e0b;
    --err: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--text);
    display: grid; grid-template-columns: 280px 1fr; height: 100vh;
  }
  aside {
    background: var(--bg-panel); border-right: 1px solid var(--border);
    padding: 20px; overflow-y: auto;
  }
  aside h1 { font-size: 16px; margin: 0 0 8px; }
  aside .sub { color: var(--text-dim); font-size: 12px; margin-bottom: 20px; }
  .health { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
  .health .row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; padding: 6px 10px; background: var(--bg-card); border-radius: 4px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .dot.ok { background: var(--ok); } .dot.warn { background: var(--warn); } .dot.err { background: var(--err); }
  .filters { margin-bottom: 20px; }
  .filters h3 { font-size: 12px; color: var(--text-dim); text-transform: uppercase;
                margin: 0 0 8px; letter-spacing: 0.5px; }
  .etf-list { display: flex; flex-direction: column; gap: 4px; }
  .etf-item {
    padding: 8px 10px; background: var(--bg-card); border-radius: 4px;
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .etf-item:hover { background: #2c333e; }
  .etf-item.active { border-left-color: var(--accent); background: #2c333e; }
  .etf-item .count { color: var(--text-dim); font-size: 11px;
                     background: var(--bg); padding: 2px 6px; border-radius: 10px; }
  .etf-item .count.new { color: var(--accent); font-weight: bold; }
  .source-toggles { display: flex; gap: 6px; margin-top: 8px; }
  .source-toggles button {
    flex: 1; padding: 6px; background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .source-toggles button.active { background: var(--accent); border-color: var(--accent); }
  main {
    display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  header .title { font-size: 14px; color: var(--text-dim); }
  header .title strong { color: var(--text); font-size: 16px; }
  header .stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-dim); }
  header .stats span { display: flex; align-items: center; gap: 4px; }
  .search {
    padding: 8px 12px; background: var(--bg-panel); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; width: 220px; font-size: 13px;
  }
  .refresh-btn {
    padding: 6px 12px; background: var(--accent); border: none; color: white;
    border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: opacity 0.15s;
  }
  .refresh-btn:hover { opacity: 0.85; }
  .refresh-btn:disabled { opacity: 0.5; cursor: wait; }
  .feed {
    flex: 1; overflow-y: auto; padding: 16px 24px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 16px; animation: slideIn 0.3s ease;
  }
  .card.new { border-left: 3px solid var(--accent); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px; font-size: 12px; color: var(--text-dim);
  }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .badge.naver { background: rgba(3, 199, 90, 0.2); color: var(--naver); }
  .badge.toss  { background: rgba(49, 130, 246, 0.2); color: var(--toss); }
  .etf-name { font-weight: 700; }
  .etf-name.brand-ACE   { color: #c084fc; }  /* 보라 */
  .etf-name.brand-TIGER { color: #fb923c; }  /* 주황 */
  .etf-name.brand-KODEX { color: #60a5fa; }  /* 파랑 */
  .etf-name.brand-1Q    { color: #34d399; }  /* 초록 */
  .etf-name.brand-WON   { color: #f87171; }  /* 빨강 */
  .etf-code { color: var(--text-dim); font-weight: normal; margin-left: 6px; }
  .card .title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .card .content {
    font-size: 13px; color: var(--text); line-height: 1.5; white-space: pre-wrap;
    max-height: 100px; overflow: hidden; position: relative;
  }
  .card .content.expanded { max-height: none; }
  .card .content-fade {
    position: absolute; bottom: 0; left: 0; right: 0; height: 30px;
    background: linear-gradient(transparent, var(--bg-card));
    pointer-events: none;
  }
  .card .meta {
    margin-top: 8px; display: flex; gap: 12px; font-size: 11px; color: var(--text-dim);
  }
  .card .meta .hl { color: var(--text); }
  mark { background: #ffd54f; color: #000; padding: 0 2px; border-radius: 2px; }
  .empty { color: var(--text-dim); text-align: center; padding: 40px; font-size: 14px; }
  .toast {
    position: fixed; top: 20px; right: 20px; background: var(--accent);
    color: white; padding: 10px 16px; border-radius: 6px; font-size: 13px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <aside>
    <h1>📈 종토방 모니터링</h1>
    <div class="sub">네이버 · 토스증권 실시간</div>

    <div class="health" id="health"></div>

    <div class="filters">
      <h3>ETF 필터</h3>
      <div class="etf-list" id="etfList"></div>
    </div>

    <div class="filters">
      <h3>소스</h3>
      <div class="source-toggles" id="sourceToggles">
        <button data-source="" class="active">전체</button>
        <button data-source="네이버">네이버</button>
        <button data-source="토스증권">토스</button>
      </div>
    </div>
  </aside>

  <main>
    <header>
      <div class="title">
        실시간 피드 <strong id="feedTitle">전체 ETF</strong>
        <span id="connStatus" style="margin-left:10px;font-size:11px;"></span>
      </div>
      <div class="stats">
        <span>🕐 <strong id="nowClock">--:--:--</strong></span>
        <span>최근 갱신: <strong id="lastRefresh">-</strong></span>
        <button class="refresh-btn" id="refreshBtn" title="수동 새로고침">🔄 새로고침</button>
        <span>신규: <strong id="newCount">0</strong></span>
        <span>총: <strong id="totalCount">0</strong></span>
        <input class="search" id="search" placeholder="🔍 키워드 검색" />
      </div>
    </header>

    <div class="feed" id="feed">
      <div class="empty">대기 중... 새 게시물이 올라오면 여기에 표시됩니다.</div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

<script>
const state = {
  etfs: [],
  selectedEtf: null,
  selectedSource: "",
  keyword: "",
  newCountSinceLast: 0,
  totalCount: 0,
  etfCounts: {},
  posts: [],
  maxPosts: 300,
};

function el(tag, props = {}, ...kids) {
  const e = document.createElement(tag);
  Object.assign(e, props);
  for (const k of kids) if (k) e.append(k);
  return e;
}

async function loadEtfs() {
  const res = await fetch("/api/etfs");
  state.etfs = await res.json();
  renderEtfList();
}

function renderEtfList() {
  const container = document.getElementById("etfList");
  container.innerHTML = "";
  const allItem = el("div", { className: "etf-item" + (state.selectedEtf ? "" : " active") });
  allItem.append(el("span", { textContent: "전체" }));
  allItem.append(el("span", { className: "count", textContent: state.totalCount }));
  allItem.onclick = () => { state.selectedEtf = null; applyFilters(); };
  container.append(allItem);

  for (const etf of state.etfs) {
    const active = state.selectedEtf === etf.code;
    const c = state.etfCounts[etf.code] || 0;
    const brand = brandOf(etf.name);
    const item = el("div", { className: "etf-item" + (active ? " active" : "") });
    item.append(el("div", {},
      el("div", {
        className: "etf-name" + (brand ? " brand-" + brand : ""),
        style: "font-size:12px",
        textContent: etf.name,
      }),
      el("div", { style: "font-size:11px;color:var(--text-dim)", textContent: etf.code })
    ));
    item.append(el("span", { className: "count" + (c > 0 ? " new" : ""), textContent: c }));
    item.onclick = () => { state.selectedEtf = etf.code; applyFilters(); };
    container.append(item);
  }
}

function renderHealth(h) {
  const container = document.getElementById("health");
  container.innerHTML = "";
  for (const src of ["naver", "toss"]) {
    const hs = h[src] || {};
    const cls = hs.consecutive_errors > 2 ? "err" : hs.consecutive_errors > 0 ? "warn" : "ok";
    const row = el("div", { className: "row" });
    row.append(el("span", {}, el("span", { className: "dot " + cls }),
                            document.createTextNode(src === "naver" ? "네이버" : "토스")));
    row.append(el("span", { style: "color:var(--text-dim)",
                            textContent: hs.last_ok ? hs.last_ok.slice(11, 19) : "대기 중" }));
    container.append(row);
  }
}

async function loadStats() {
  try {
    const res = await fetch("/api/stats");
    const s = await res.json();
    state.totalCount = s.total;
    state.etfCounts = {};
    for (const r of s.by_etf_source) {
      state.etfCounts[r.etf_code] = (state.etfCounts[r.etf_code] || 0) + r.n;
    }
    document.getElementById("totalCount").textContent = s.total;
    renderEtfList();
    renderHealth(s.health);
  } catch (e) { console.error(e); }
}

async function loadRecent() {
  const params = new URLSearchParams();
  params.set("limit", "100");
  if (state.selectedEtf) params.set("etf_code", state.selectedEtf);
  if (state.selectedSource) params.set("source", state.selectedSource);
  const res = await fetch("/api/recent?" + params);
  state.posts = await res.json();
  renderFeed();
}

function applyFilters() {
  renderEtfList();
  document.getElementById("feedTitle").textContent =
    state.selectedEtf ? (state.etfs.find(e => e.code === state.selectedEtf)?.name || state.selectedEtf) : "전체 ETF";
  loadRecent();
}

function highlight(text, kw) {
  if (!kw) return text;
  const re = new RegExp("(" + kw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
  return text.replace(re, "<mark>$1</mark>");
}

function matchesFilter(p) {
  if (state.selectedEtf && p.etf_code !== state.selectedEtf) return false;
  if (state.selectedSource && p.source !== state.selectedSource) return false;
  if (state.keyword) {
    const hay = (p.title + " " + p.content).toLowerCase();
    if (!hay.includes(state.keyword.toLowerCase())) return false;
  }
  return true;
}

function renderFeed() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";
  const visible = state.posts.filter(matchesFilter);
  if (visible.length === 0) {
    feed.append(el("div", { className: "empty", textContent: "표시할 게시물이 없습니다." }));
    return;
  }
  for (const p of visible) feed.append(buildCard(p));
}

function brandOf(name) {
  const head = (name || "").trim().split(/\s+/)[0] || "";
  if (["ACE", "TIGER", "KODEX", "1Q", "WON"].includes(head)) return head;
  return "";
}

function buildCard(p, isNew = false) {
  const card = el("div", { className: "card" + (isNew ? " new" : "") });
  const head = el("div", { className: "card-head" });
  const left = el("span");
  const brand = brandOf(p.etf_name);
  left.append(el("span", {
    className: "etf-name" + (brand ? " brand-" + brand : ""),
    textContent: p.etf_name || p.etf_code,
  }));
  left.append(el("span", { className: "etf-code", textContent: "[" + p.etf_code + "]" }));
  left.append(document.createTextNode(" "));
  left.append(el("span", {
    className: "badge " + (p.source === "네이버" ? "naver" : "toss"),
    textContent: p.source,
  }));
  head.append(left);
  head.append(el("span", { textContent: p.post_date || p.crawled_at }));
  card.append(head);

  if (p.title) {
    const t = el("div", { className: "title" });
    t.innerHTML = highlight(p.title, state.keyword);
    card.append(t);
  }
  const content = (p.content || "").trim();
  if (content) {
    const c = el("div", { className: "content" });
    c.innerHTML = highlight(content, state.keyword);
    if (content.length > 200) {
      c.append(el("div", { className: "content-fade" }));
      c.onclick = () => c.classList.toggle("expanded");
      c.style.cursor = "pointer";
    }
    card.append(c);
  }
  const meta = el("div", { className: "meta" });
  if (p.author) meta.append(el("span", { textContent: "👤 " + p.author }));
  if (p.likes) meta.append(el("span", {}, document.createTextNode("👍 "),
                              el("span", { className: "hl", textContent: p.likes })));
  if (p.dislikes) meta.append(el("span", {}, document.createTextNode("👎 "),
                                el("span", { className: "hl", textContent: p.dislikes })));
  if (p.comments) meta.append(el("span", {}, document.createTextNode("💬 "),
                                el("span", { className: "hl", textContent: p.comments })));
  if (meta.children.length) card.append(meta);
  return card;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function connectSSE() {
  const es = new EventSource("/api/stream");
  const status = document.getElementById("connStatus");
  status.innerHTML = '<span class="dot ok"></span><span style="color:var(--ok)">연결됨</span>';

  es.addEventListener("hello", () => { /* nop */ });
  es.addEventListener("post", (ev) => {
    const data = JSON.parse(ev.data);
    const p = data.post;
    const key = (x) => x.post_date || x.crawled_at || "";
    // insert in sorted order (latest post_date first)
    let idx = 0;
    while (idx < state.posts.length && key(state.posts[idx]) > key(p)) idx++;
    state.posts.splice(idx, 0, p);
    if (state.posts.length > state.maxPosts) state.posts.pop();
    state.totalCount++;
    state.etfCounts[p.etf_code] = (state.etfCounts[p.etf_code] || 0) + 1;
    state.newCountSinceLast++;
    document.getElementById("totalCount").textContent = state.totalCount;
    document.getElementById("newCount").textContent = state.newCountSinceLast;
    renderEtfList();
    if (matchesFilter(p)) renderFeed();
    markRefreshed();
    showToast(`새 글: [${p.etf_code}] ${(p.title || p.content).slice(0, 30)}`);
  });

  es.onerror = () => {
    status.innerHTML = '<span class="dot err"></span><span style="color:var(--err)">재연결 중...</span>';
  };
  es.onopen = () => {
    status.innerHTML = '<span class="dot ok"></span><span style="color:var(--ok)">연결됨</span>';
  };
}

// source toggles
document.getElementById("sourceToggles").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  document.querySelectorAll("#sourceToggles button").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  state.selectedSource = e.target.dataset.source;
  applyFilters();
});

// search
document.getElementById("search").addEventListener("input", (e) => {
  state.keyword = e.target.value.trim();
  renderFeed();
});

// reset new count on click of feed title
document.getElementById("feedTitle").addEventListener("click", () => {
  state.newCountSinceLast = 0;
  document.getElementById("newCount").textContent = 0;
});

// live clock
function pad(n) { return n < 10 ? "0" + n : "" + n; }
function fmtTime(d) {
  return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
}
function fmtDateTime(d) {
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate())
       + " " + fmtTime(d);
}
setInterval(() => {
  document.getElementById("nowClock").textContent = fmtTime(new Date());
}, 1000);
document.getElementById("nowClock").textContent = fmtTime(new Date());

function markRefreshed() {
  document.getElementById("lastRefresh").textContent = fmtDateTime(new Date());
}

async function manualRefresh() {
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = "⏳ 갱신 중...";
  try {
    await loadStats();
    await loadRecent();
    markRefreshed();
    showToast("새로고침 완료");
  } catch (e) {
    showToast("새로고침 실패: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}
document.getElementById("refreshBtn").addEventListener("click", manualRefresh);

(async () => {
  await loadEtfs();
  await loadStats();
  await loadRecent();
  markRefreshed();
  connectSSE();
  setInterval(async () => { await loadStats(); markRefreshed(); }, 30000);
})();
</script>
</body>
</html>
